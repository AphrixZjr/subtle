name: Local Windows build on upstream push

# Fork-side controller: receive repository_dispatch immediately and poll upstream main every 15 minutes.
# Check out the controller and upstream source separately so branch/tag/SHA always comes from upstream.

on:
  repository_dispatch:
    types: [upstream-push]
  workflow_dispatch:
    inputs:
      ref:
        description: "Upstream branch, tag, or full 40-character SHA (default: main)"
        required: false
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read

concurrency:
  # Coalesce main update signals; keep each manual branch/tag/SHA run in its own group.
  group: ${{ github.event_name == 'workflow_dispatch' && format('local-windows-manual-{0}', github.run_id) || 'local-windows-main-updates' }}
  # A full Windows build may exceed the polling interval, so a later schedule must not cancel it.
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: [self-hosted, windows, x64, subtle-build]
    timeout-minutes: 120
    env:
      CI: "true"
      HTTP_PROXY: http://127.0.0.1:10808
      HTTPS_PROXY: http://127.0.0.1:10808
      NO_PROXY: 127.0.0.1,localhost

    steps:
      - name: Checkout fork CI controller
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          path: controller
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve requested upstream ref
        id: request
        shell: powershell
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_SHA: ${{ github.event.client_payload.sha }}
          DISPATCH_REF: ${{ github.event.client_payload.ref }}
          MANUAL_REF: ${{ github.event.inputs.ref }}
        run: |
          $ErrorActionPreference = 'Stop'

          if ($env:EVENT_NAME -eq 'repository_dispatch') {
            if ($env:DISPATCH_SHA -notmatch '^[0-9a-fA-F]{40}$') {
              throw 'repository_dispatch must include a full 40-character SHA.'
            }
            if ($env:DISPATCH_REF -ne 'refs/heads/main') {
              throw "Only upstream main dispatches are accepted; received: $env:DISPATCH_REF"
            }
            $requested = $env:DISPATCH_SHA.ToLowerInvariant()
          } elseif ($env:MANUAL_REF) {
            $requested = $env:MANUAL_REF.Trim()
          } else {
            $requested = 'main'
          }

          if ($requested -notmatch '^[0-9A-Za-z][0-9A-Za-z._/-]{0,199}$' -or
              $requested.Contains('..') -or $requested.Contains('@{') -or
              $requested.StartsWith('-') -or $requested.EndsWith('/') -or
              $requested.Contains('//')) {
            throw "Invalid upstream ref: $requested"
          }

          "ref=$requested" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Requested upstream revision: $requested"

      - name: Checkout exact upstream source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: the-dissidents/subtle
          ref: ${{ steps.request.outputs.ref }}
          path: source
          # Fetch all upstream refs so arbitrary SHAs can be proven reachable from an upstream branch or tag.
          fetch-depth: 0
          persist-credentials: false

      - name: Verify source and decide whether to build
        id: resolve
        shell: powershell
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_SHA: ${{ github.event.client_payload.sha }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          function Get-GitOutput {
            param([Parameter(Mandatory = $true)][string[]]$GitArgs)
            $output = & git @GitArgs
            if ($LASTEXITCODE -ne 0) {
              throw "git $($GitArgs -join ' ') failed with exit $LASTEXITCODE"
            }
            return (($output | Out-String).Trim())
          }

          $upstreamSha = Get-GitOutput @('-C', 'source', 'rev-parse', 'HEAD')
          $controllerSha = Get-GitOutput @('-C', 'controller', 'rev-parse', 'HEAD')
          if ($upstreamSha -notmatch '^[0-9a-f]{40}$' -or $controllerSha -notmatch '^[0-9a-f]{40}$') {
            throw 'Checkout returned an invalid commit SHA.'
          }
          if ($env:DISPATCH_SHA -and $upstreamSha -ne $env:DISPATCH_SHA.ToLowerInvariant()) {
            throw "Upstream checkout does not match dispatch SHA: expected=$env:DISPATCH_SHA actual=$upstreamSha"
          }

          $containingRefs = @(& git -C source for-each-ref --format='%(refname)' --contains $upstreamSha 'refs/remotes/origin/' 'refs/tags/')
          if ($LASTEXITCODE -ne 0 -or $containingRefs.Count -eq 0) {
            throw "Checkout SHA is not reachable from an upstream branch or tag: $upstreamSha"
          }

          $upstreamMainSha = Get-GitOutput @('-C', 'source', 'rev-parse', 'refs/remotes/origin/main^{commit}')
          $isUpstreamMain = ($upstreamSha -eq $upstreamMainSha).ToString().ToLowerInvariant()

          $markerPath = 'C:\subtle-ci\last-successful-build-key'
          $markerValue = "$upstreamSha $controllerSha"
          if ($env:EVENT_NAME -eq 'schedule' -and (Test-Path -LiteralPath $markerPath)) {
            $lastBuilt = (Get-Content -Raw -LiteralPath $markerPath).Trim()
            if ($lastBuilt -eq $markerValue) {
              "should_build=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              "upstream_sha=$upstreamSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              "controller_sha=$controllerSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              "is_upstream_main=$isUpstreamMain" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              Write-Host 'Upstream and CI controller are unchanged; skipping duplicate build.'
              exit 0
            }
          }

          "should_build=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "upstream_sha=$upstreamSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "controller_sha=$controllerSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "is_upstream_main=$isUpstreamMain" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Upstream commit: $upstreamSha"
          Write-Host "Controller commit: $controllerSha"

      - name: Overlay trusted Windows build scripts
        if: steps.resolve.outputs.should_build == 'true'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($name in @('build-windows-local.ps1', 'build-windows.ps1', 'windows-repack-test.ps1')) {
            $source = Join-Path (Join-Path $env:GITHUB_WORKSPACE 'controller') $name
            $target = Join-Path (Join-Path $env:GITHUB_WORKSPACE 'source') $name
            if (-not (Test-Path -LiteralPath $source -PathType Leaf)) {
              throw "Controller build script is missing: $source"
            }
            Copy-Item -LiteralPath $source -Destination $target -Force
          }

      - name: Prepare exact artifact path
        id: artifact
        if: steps.resolve.outputs.should_build == 'true'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $sourceRoot = Join-Path $env:GITHUB_WORKSPACE 'source'
          $version = (Get-Content -Raw -LiteralPath (Join-Path $sourceRoot 'package.json') | ConvertFrom-Json).version
          if ($version -notmatch '^[0-9A-Za-z][0-9A-Za-z.+-]{0,63}$') {
            throw "Invalid package.json version: $version"
          }
          $artifact = Join-Path $sourceRoot "src-tauri\target\release\subtle $version windows x64.zip"
          if (Test-Path -LiteralPath $artifact) {
            Remove-Item -LiteralPath $artifact -Force
          }
          $started = [DateTime]::UtcNow.ToString('o', [Globalization.CultureInfo]::InvariantCulture)
          "artifact_path=$artifact" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "build_started_utc=$started" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build exact upstream source with local toolchain
        if: steps.resolve.outputs.should_build == 'true'
        shell: powershell
        working-directory: source
        run: ./build-windows-local.ps1

      - name: Upload verified artifact to Google Drive
        if: steps.resolve.outputs.should_build == 'true'
        shell: powershell
        env:
          RCLONE_EXE: C:\subtle-ci\rclone.exe
          RCLONE_CONFIG: C:\subtle-ci\rclone.conf
          GDRIVE_FOLDER_ID: ${{ vars.GDRIVE_FOLDER_ID || '1Y2Cutr-QaUggJv4VOVc0jfw6eVF3F5nn' }}
          UPSTREAM_SHA: ${{ steps.resolve.outputs.upstream_sha }}
          CONTROLLER_SHA: ${{ steps.resolve.outputs.controller_sha }}
          BUILD_STARTED_UTC: ${{ steps.artifact.outputs.build_started_utc }}
          BUILD_ARTIFACT_PATH: ${{ steps.artifact.outputs.artifact_path }}
        run: ./controller/ci/upload-to-gdrive.ps1 -SourceRoot "$env:GITHUB_WORKSPACE\source" -ArtifactPath "$env:BUILD_ARTIFACT_PATH"

      - name: Record last successful upstream main build
        if: steps.resolve.outputs.should_build == 'true' && steps.resolve.outputs.is_upstream_main == 'true'
        shell: powershell
        env:
          UPSTREAM_SHA: ${{ steps.resolve.outputs.upstream_sha }}
          CONTROLLER_SHA: ${{ steps.resolve.outputs.controller_sha }}
        run: |
          if ($env:UPSTREAM_SHA -notmatch '^[0-9a-f]{40}$' -or $env:CONTROLLER_SHA -notmatch '^[0-9a-f]{40}$') {
            throw 'Refusing to record an invalid build key.'
          }
          New-Item -ItemType Directory -Path 'C:\subtle-ci' -Force | Out-Null
          Set-Content -LiteralPath 'C:\subtle-ci\last-successful-build-key' -Value "$env:UPSTREAM_SHA $env:CONTROLLER_SHA" -Encoding ascii
