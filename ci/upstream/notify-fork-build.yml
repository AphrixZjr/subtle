name: Notify fork to build

# 提交到上游 the-dissidents/subtle 的 .github/workflows/notify-fork-build.yml。
#
# 设计目标：让上游 maintainer 放心合并。
#   - 零第三方 action，纯 curl 调 GitHub API。
#   - 默认无副作用：仅当上游配置了变量 FORK_DISPATCH_REPO 且存在密钥 FORK_DISPATCH_PAT
#     时才发信号；未配置则整个 job 被 if 跳过，对上游及其他贡献者的 PR 零影响。
#
# 上游需配置（Settings → Secrets and variables → Actions）：
#   - Variable  FORK_DISPATCH_REPO = <owner>/<fork>   例如 AphrixZjr/subtle
#   - Secret    FORK_DISPATCH_PAT  = 能对该 fork 触发 repository_dispatch 的 token

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    if: ${{ vars.FORK_DISPATCH_REPO != '' }}
    steps:
      - name: Fire repository_dispatch to fork
        env:
          PAT: ${{ secrets.FORK_DISPATCH_PAT }}
          TARGET: ${{ vars.FORK_DISPATCH_REPO }}
          UPSTREAM_REPO: ${{ github.repository }}
          UPSTREAM_REF: ${{ github.ref }}
          UPSTREAM_SHA: ${{ github.sha }}
          UPSTREAM_PUSHER: ${{ github.actor }}
        run: |
          if [ -z "$PAT" ]; then
            echo "FORK_DISPATCH_PAT secret 未设置，跳过。" && exit 0
          fi
          payload="$(jq -n \
            --arg repo "$UPSTREAM_REPO" \
            --arg ref "$UPSTREAM_REF" \
            --arg sha "$UPSTREAM_SHA" \
            --arg pusher "$UPSTREAM_PUSHER" \
            '{event_type:"upstream-push",client_payload:{upstream_repo:$repo,ref:$ref,sha:$sha,pusher:$pusher}}')"
          curl -sS -f -L -X POST \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 3 \
            --retry-all-errors \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PAT" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${TARGET}/dispatches" \
            --data "$payload"
          echo "Dispatched upstream-push -> ${TARGET}"
